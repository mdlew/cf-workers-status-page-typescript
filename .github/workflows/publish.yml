name: Deploy

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --force --fix-lockfile --no-frozen-lockfile --config.strict-dep-builds=false

      - name: Build
        run: pnpm --config.strict-dep-builds=false run build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          packageManager: pnpm
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          environment: production
          secrets: |
            SECRET_DISCORD_WEBHOOK_URL
        env:
          SECRET_DISCORD_WEBHOOK_URL: ${{ secrets.SECRET_DISCORD_WEBHOOK_URL }}

      - uses: actions/upload-artifact@v7
        with:
          name: build
          path: |
            ~/**/pnpm-lock.yaml
            ~/**/worker-configuration.d.ts
